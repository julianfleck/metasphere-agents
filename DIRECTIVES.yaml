date: 2026-04-12
source: @julian
text: No Gemini, no non-Anthropic provider abstraction layers, no multi-provider architecture. BUT: a --model flag on claude-code invocations IS wanted — letting agents specify which Anthropic model to use (e.g. Haiku for low-stakes work). This is a CLI pass-through, not a harness abstraction. The schedule Job.model field should wire through to the actual claude invocation.
